name: Deploy to IONOS via SFTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via SFTP to IONOS
        run: |
          lftp -c "
            set sftp:auto-confirm yes;
            open sftp://${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}@${{ secrets.FTP_SERVER }};
            mirror -R --delete \
              --exclude-glob .git \
              --exclude-glob .github \
              ./ /;
          "
