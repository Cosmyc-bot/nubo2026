<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" fill="none" role="img" aria-label="nubo logo">
  <!-- Mark: circle with horizon + rising arc -->
  <circle cx="28" cy="28" r="24" stroke="#2D5A8A" stroke-width="2.8"/>
  <path d="M 11 30 L 45 30" stroke="#2D5A8A" stroke-width="1.4" stroke-linecap="round" opacity="0.2"/>
  <path d="M 13 30 A 15 15 0 0 1 43 30" stroke="#C49640" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Wordmark: nubo in Playfair Display italic -->
  <text
    x="66"
    y="37"
    font-family="Playfair Display, Georgia, serif"
    font-size="30"
    font-style="italic"
    font-weight="400"
    fill="#1A1E2C"
    letter-spacing="-0.5"
  >nubo</text>

  <!-- Gold dot -->
  <circle cx="161" cy="26" r="4" fill="#C49640"/>
</svg>
